esphome:
  name: car-integration
  friendly_name: Car Integration
  build_path: /tmp/esphome-car-obd-build

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Car OBD Fallback"
    password: !secret wifi_password

web_server:
  port: 80

captive_portal:

uart:
  - id: uart_obd
    rx_pin: GPIO17
    tx_pin: GPIO16
    baud_rate: 38400
    rx_buffer_size: 512

sensor:
  - platform: elm327_uart
    uart_id: uart_obd
    update_interval: 10s
    rpm:
      name: "Car RPM"
    speed:
      name: "Car Speed"
    coolant_temperature:
      name: "Car Coolant Temperature"
    control_module_voltage:
      name: "Car ECU Voltage"
    throttle_position:
      name: "Car Throttle Position"
    intake_air_temperature:
      name: "Car Intake Air Temperature"

binary_sensor:
  - platform: status
    name: "Car OBD Status"

button:
  - platform: restart
    name: "Car OBD Restart"
