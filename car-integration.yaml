esphome:
  name: car-integration
  friendly_name: Car Integration
  build_path: /tmp/esphome-car-obd-build

substitutions:
  gate_phone_number: "+380981526161"

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ap:
    ssid: "Car OBD Fallback"
    password: !secret wifi_password

web_server:
  port: 80

captive_portal:

uart:
  - id: uart_obd
    rx_pin: GPIO17
    tx_pin: GPIO16
    baud_rate: 38400
    rx_buffer_size: 512
  - id: uart_modem
    rx_pin: GPIO20
    tx_pin: GPIO21
    baud_rate: 115200
    rx_buffer_size: 1024
    debug:
      direction: RX
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: UARTDebug::log_string(direction, bytes);

sensor:
  - platform: elm327_uart
    uart_id: uart_obd
    update_interval: 10s
    rpm:
      name: "Car RPM"
    speed:
      name: "Car Speed"
    coolant_temperature:
      name: "Car Coolant Temperature"
    control_module_voltage:
      name: "Car ECU Voltage"
    throttle_position:
      name: "Car Throttle Position"
    intake_air_temperature:
      name: "Car Intake Air Temperature"
  - platform: a7670e_gnss
    uart_id: uart_modem
    update_interval: 30s
    latitude:
      name: "Car Latitude"
    longitude:
      name: "Car Longitude"
    altitude:
      name: "Car Altitude"
    speed:
      name: "Car GNSS Speed"
    course:
      name: "Car Course"
    hdop:
      name: "Car GNSS HDOP"
    satellites:
      name: "Car GNSS Satellites"
    fix_mode:
      name: "Car GNSS Fix Mode"
    mqtt:
      apn: !secret apn
      host: !secret mqtt_host
      port: !secret mqtt_port
      username: !secret mqtt_username
      password: !secret mqtt_password
      use_tls: !secret use_tls
      topic: "car/forester/state"

binary_sensor:
  - platform: status
    name: "Car OBD Status"

button:
  - platform: restart
    name: "Car OBD Restart"
  - platform: template
    name: "Car Modem AT"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT\r"
  - platform: template
    name: "Car Modem Signal"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CSQ\r"
  - platform: template
    name: "Car Modem Network Registration"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CREG?\r"
  - platform: template
    name: "Car Modem Enable GNSS"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CGNSSPWR=1\r"
  - platform: template
    name: "Car Modem GNSS Info"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CGNSSINFO\r"
  - platform: template
    name: "Car Open Gate"
    on_press:
      - uart.write:
          id: uart_modem
          data: "ATD${gate_phone_number};\r"
      - delay: 10s
      - uart.write:
          id: uart_modem
          data: "ATH\r"
  - platform: template
    name: "Car Modem Hang Up"
    on_press:
      - uart.write:
          id: uart_modem
          data: "ATH\r"
