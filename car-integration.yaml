esphome:
  name: car-integration
  friendly_name: Car Integration
  build_path: /tmp/esphome-car-obd-build

substitutions:
  gate_phone_number: "+380981526161"

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ap:
    ssid: "Car OBD Fallback"
    password: !secret wifi_password

web_server:
  port: 80

captive_portal:

mqtt:
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false

uart:
  - id: uart_obd
    rx_pin: GPIO17
    tx_pin: GPIO16
    baud_rate: 38400
    rx_buffer_size: 512
  - id: uart_modem
    rx_pin: GPIO20
    tx_pin: GPIO21
    baud_rate: 115200
    rx_buffer_size: 1024
    debug:
      direction: RX
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: UARTDebug::log_string(direction, bytes);

sensor:
  - platform: elm327_uart
    uart_id: uart_obd
    update_interval: 10s
    rpm:
      name: "Car RPM"
    speed:
      name: "Car Speed"
    coolant_temperature:
      name: "Car Coolant Temperature"
    control_module_voltage:
      name: "Car ECU Voltage"
    throttle_position:
      name: "Car Throttle Position"
    intake_air_temperature:
      name: "Car Intake Air Temperature"
    fuel_level:
      name: "Car Fuel Level"
  - platform: a7670e_gnss
    uart_id: uart_modem
    update_interval: 30s
    latitude:
      name: "Car Latitude"
    longitude:
      name: "Car Longitude"
    altitude:
      name: "Car Altitude"
    speed:
      name: "Car GNSS Speed"
    course:
      name: "Car Course"
    hdop:
      name: "Car GNSS HDOP"
    satellites:
      name: "Car GNSS Satellites"
    fix_mode:
      name: "Car GNSS Fix Mode"
    mqtt:
      apn: !secret apn
      host: !secret mqtt_host
      port: !secret mqtt_port
      username: !secret mqtt_username
      password: !secret mqtt_password
      use_tls: !secret use_tls
      topic: "car/forester/state"

binary_sensor:
  - platform: status
    name: "Car OBD Status"

button:
  - platform: restart
    name: "Car OBD Restart"
  - platform: template
    name: "Car Modem AT"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT\r"
  - platform: template
    name: "Car Modem Signal"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CSQ\r"
  - platform: template
    name: "Car Modem Network Registration"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CREG?\r"
  - platform: template
    name: "Car Modem Enable GNSS"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CGNSSPWR=1\r"
  - platform: template
    name: "Car Modem GNSS Info"
    on_press:
      - uart.write:
          id: uart_modem
          data: "AT+CGNSSINFO\r"
  - platform: template
    name: "Car Open Gate"
    on_press:
      - uart.write:
          id: uart_modem
          data: "ATD${gate_phone_number};\r"
      - delay: 10s
      - uart.write:
          id: uart_modem
          data: "ATH\r"
  - platform: template
    name: "Car Modem Hang Up"
    on_press:
      - uart.write:
          id: uart_modem
          data: "ATH\r"

automation:
  - alias: "Publish OBD Discovery"
    trigger:
      platform: homeassistant
      event: start
    action:
      - mqtt.publish:
          topic: "homeassistant/sensor/car_rpm/config"
          payload: '{"name":"Car RPM","uniq_id":"car_rpm","stat_t":"car/forester/state","val_tpl":"{{ value_json.rpm }}","unit_of_meas":"rpm","icon":"mdi:engine","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true
      - mqtt.publish:
          topic: "homeassistant/sensor/car_speed_obd/config"
          payload: '{"name":"Car Speed OBD","uniq_id":"car_speed_obd","stat_t":"car/forester/state","val_tpl":"{{ value_json.speed_obd }}","unit_of_meas":"km/h","icon":"mdi:speedometer","device_class":"speed","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true
      - mqtt.publish:
          topic: "homeassistant/sensor/car_coolant_temp/config"
          payload: '{"name":"Car Coolant Temperature","uniq_id":"car_coolant_temp","stat_t":"car/forester/state","val_tpl":"{{ value_json.coolant_temp }}","unit_of_meas":"°C","device_class":"temperature","icon":"mdi:thermometer","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true
      - mqtt.publish:
          topic: "homeassistant/sensor/car_throttle/config"
          payload: '{"name":"Car Throttle Position","uniq_id":"car_throttle","stat_t":"car/forester/state","val_tpl":"{{ value_json.throttle }}","unit_of_meas":"%","icon":"mdi:car-turbocharger","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true
      - mqtt.publish:
          topic: "homeassistant/sensor/car_fuel/config"
          payload: '{"name":"Car Fuel Level","uniq_id":"car_fuel","stat_t":"car/forester/state","val_tpl":"{{ value_json.fuel }}","unit_of_meas":"%","icon":"mdi:fuel","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true
      - mqtt.publish:
          topic: "homeassistant/sensor/car_voltage/config"
          payload: '{"name":"Car ECU Voltage","uniq_id":"car_voltage","stat_t":"car/forester/state","val_tpl":"{{ value_json.voltage }}","unit_of_meas":"V","device_class":"voltage","icon":"mdi:car-battery","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true
      - mqtt.publish:
          topic: "homeassistant/sensor/car_intake_temp/config"
          payload: '{"name":"Car Intake Air Temperature","uniq_id":"car_intake_temp","stat_t":"car/forester/state","val_tpl":"{{ value_json.intake_temp }}","unit_of_meas":"°C","device_class":"temperature","icon":"mdi:thermometer","avty_t":"car/forester/status","pl_avail":"online","pl_not_avail":"offline","dev":{"ids":["car_forester"],"name":"Car Forester","mf":"DIY","mdl":"ESP32-C6 + A7670E + ELM327"}}'
          retain: true

  - alias: "Publish OBD Data to MQTT"
    trigger:
      platform: time_pattern
      seconds: 10
    condition:
      platform: template
      value_template: "{{ (state_attr('sensor.car_rpm', 'unit_of_measurement') or 'rpm') != '' }}"
    action:
      - service: mqtt.publish
        data_template:
          topic: "car/forester/state"
          payload: >-
            {
              "rpm": {{ states('sensor.car_rpm') | float(-1) }},
              "speed_obd": {{ states('sensor.car_speed') | float(-1) }},
              "coolant_temp": {{ states('sensor.car_coolant_temperature') | float(-999) }},
              "throttle": {{ states('sensor.car_throttle_position') | float(-1) }},
              "fuel": {{ states('sensor.car_fuel_level') | float(-1) | default(-1, true) }},
              "voltage": {{ states('sensor.car_ecu_voltage') | float(-1) | default(0, true) }},
              "intake_temp": {{ states('sensor.car_intake_air_temperature') | float(-999) }}
            }
          retain: false
